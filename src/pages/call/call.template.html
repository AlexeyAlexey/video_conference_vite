<div class="min-h-screen bg-base-200">
  <div id="callStage" class="relative w-full h-[100svh] overflow-hidden">
    <video id="remoteVideo" class="w-full h-full object-cover" autoplay playsinline muted></video>

    <video id="localVideo"
      class="absolute z-10 w-40 h-28 md:w-64 md:h-40 rounded-box border border-base-300 shadow-lg object-cover bg-black cursor-move touch-none select-none"
      autoplay playsinline muted></video>

    <div class="fixed inset-x-0 bottom-0 z-10">
      <div class="mx-auto max-w-screen-md px-4 pb-6">
        <div id="controlBar" class="navbar min-h-8 bg-base-100/80 backdrop-blur rounded-box shadow">
          <div class="mx-auto flex items-center gap-2 py-1">
            <button id="audioToggleBtn" aria-label="Toggle microphone" class="btn btn-ghost btn-circle btn-sm">
              <span id="previewAudioIconOn" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-3 h-3">
                  <path d="M12 3a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V6a3 3 0 0 0-3-3z"></path>
                  <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                  <path d="M12 19v2"></path>
                </svg>
              </span>
              <span id="previewAudioIconOff" class="hidden" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-3 h-3">
                  <path d="M12 3a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V6a3 3 0 0 0-3-3z"></path>
                  <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                  <path d="M12 19v2"></path>
                  <path d="M2 2l20 20"></path>
                </svg>
              </span>
            </button>

            <button id="end-call" aria-label="End call" class="btn btn-error btn-circle btn-sm">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5">
                <path d="M4.93 10.93a10.5 10.5 0 0 1 14.14 0" />
                <line x1="7" y1="14" x2="3" y2="18" />
                <line x1="21" y1="18" x2="17" y2="14" />
              </svg>
            </button>

            <button id="videoToggleBtn" aria-label="Toggle camera" class="btn btn-ghost btn-circle btn-sm">
              <span id="previewVideoIconOn" class="hidden" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-3 h-3">
                  <rect x="3" y="7" width="12" height="10" rx="2" ry="2"></rect>
                  <path d="M21 7l-6 4v2l6 4V7z"></path>
                </svg>
              </span>
              <span id="previewVideoIconOff" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-3 h-3">
                  <rect x="3" y="7" width="12" height="10" rx="2" ry="2"></rect>
                  <path d="M21 7l-6 4v2l6 4V7z"></path>
                  <path d="M2 2l20 20"></path>
                </svg>
              </span>
            </button>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>
