<li class="list-row md:items-center items-start rounded-box transition-colors select-none flex relative overflow-hidden"
  data-id="${props.id}" data-name="${props.name}" data-password-required="${props.password_required}">
  <div class="swipe-content-wrapper relative z-10 flex flex-col md:flex-row gap-1 md:gap-0 w-full">
    <div class="flex items-center gap-2 min-w-0 w-full md:w-auto md:flex-shrink-0">
      <span class="font-medium cursor-text js-name text-sm sm:text-base"
        title="Double-click to edit name">${props.name}</span>
    </div>
    <div class="flex items-center gap-2 ml-0 md:ml-4 w-full md:w-80 shrink-0 min-w-0">
      <a class="truncate text-xs md:text-sm opacity-80 hover:opacity-100 hover:underline flex-1" href="${props.link}"
        target="_blank" rel="noopener noreferrer">${props.link}</a>
      <button class="btn btn-ghost btn-circle btn-sm ml-auto js-copy" type="button" aria-label="Copy link">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4">
          <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
        </svg>
      </button>
    </div>
    <div class="flex items-center gap-2 ml-0 md:ml-4 mt-1 md:mt-0">
      <span class="text-xs md:text-sm opacity-80 cursor-text js-pass"
        title="Double-click to edit password">${props.password_required ? '*****' : '(no password)'}</span>
    </div>
  </div>
  <div
    class="swipe-bg absolute right-0 top-0 bottom-0 flex items-center justify-end pr-4 bg-error text-error-content opacity-0 transition-opacity duration-200 pointer-events-none"
    style="width:80px;">
    <button class="swipe-remove-btn btn btn-circle btn-sm" aria-label="Remove">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4">
        <path d="M3 6h18"></path>
        <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
        <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path>
        <path d="M10 11v6"></path>
        <path d="M14 11v6"></path>
      </svg>
    </button>
  </div>
</li>
