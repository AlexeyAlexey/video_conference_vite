<dialog id="${props.dialogId}" class="${props.className}">
  <div class="modal-box w-11/12 max-w-lg">
    <form method="dialog">
      <button class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2" aria-label="Close">✕</button>
    </form>
    <h3 class="font-bold text-lg mb-4">Add shared link</h3>
    <form id="${props.formId}" method="dialog">
      <div class="form-control w-full mb-3">
        <label class="label"><span class="label-text">Name</span></label>
        <input type="text" class="input input-bordered w-full" id="shared_name" name="name" required />
      </div>
      <!-- <div class="form-control w-full mb-4">
        <label class="label"><span class="label-text">Password</span></label>
        <input type="password" class="input input-bordered w-full" id="shared_password" name="password" />
      </div> -->
      <div class="modal-action">
        <button class="btn" type="submit">Save</button>
      </div>
    </form>
  </div>
  <form method="dialog" class="modal-backdrop">
    <button aria-label="Close">close</button>
  </form>
</dialog>
